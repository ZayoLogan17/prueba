<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaxRoom — Tienda de Vinilos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0908;
      --surface:  #131210;
      --surface2: #1c1a18;
      --border:   #2e2b27;
      --border2:  #3d3a35;
      --cream:    #f0e8d8;
      --cream2:   #c8bca8;
      --amber:    #c8952a;
      --amber2:   #e8b84b;
      --red:      #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--cream); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    h1, h2, h3, .serif { font-family: 'Playfair Display', Georgia, serif; }
    @keyframes spin    { from { transform: rotate(0deg)  } to { transform: rotate(360deg) } }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px) } to { opacity: 1; transform: translateX(0) } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px)} to { opacity: 1; transform: translateY(0) } }

    .vinyl-disc {
      width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
      background: radial-gradient(circle at 50%,
        #999 0%, #555 8%, #222 13%, #111 22%, #1a1a1a 26%,
        #0d0d0d 32%, #181818 38%, #0d0d0d 44%, #181818 50%,
        #0d0d0d 56%, #181818 62%, #111 100%);
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    }
    .vinyl-disc::after {
      content: ''; position: absolute;
      width: 13px; height: 13px; border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--amber);
      box-shadow: 0 0 0 2px #0a0908, 0 0 0 3px rgba(232,184,75,0.5);
    }
    .vinyl-disc.lg { width: 80px; height: 80px; }
    .vinyl-disc.lg::after { width: 17px; height: 17px; }
    .vinyl-disc.spinning { animation: spin 1.8s linear infinite; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: var(--border2); transform: translateY(-2px); }

    .btn { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; border-radius: 2px; padding: 9px 20px; letter-spacing: .07em; text-transform: uppercase; transition: all .15s; }
    .btn-primary { background: var(--amber); color: #0a0908; }
    .btn-primary:hover { background: var(--amber2); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--cream2); border: 1px solid var(--border2); }
    .btn-ghost:hover { border-color: var(--cream2); color: var(--cream); }
    .btn-sm-edit   { background: transparent; color: var(--amber); border: 1px solid rgba(200,149,42,.3); font-size: 11px; padding: 5px 11px; border-radius: 2px; cursor: pointer; transition: all .15s; font-family: 'Space Grotesk', sans-serif; letter-spacing: .07em; text-transform: uppercase; }
    .btn-sm-edit:hover { background: rgba(200,149,42,.1); border-color: var(--amber); }
    .btn-sm-del    { background: transparent; color: #e07070; border: 1px solid rgba(192,57,43,.3); font-size: 11px; padding: 5px 11px; border-radius: 2px; cursor: pointer; transition: all .15s; font-family: 'Space Grotesk', sans-serif; letter-spacing: .07em; text-transform: uppercase; }
    .btn-sm-del:hover { background: rgba(192,57,43,.1); border-color: var(--red); }

    input, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 2px; color: var(--cream); padding: 10px 14px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; width: 100%; outline: none; transition: border-color .15s; }
    input:focus, textarea:focus { border-color: var(--amber); }
    input::placeholder, textarea::placeholder { color: #5a5550; }
    label { font-size: 11px; color: var(--cream2); font-weight: 500; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; display: block; }

    .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.88); display: flex; align-items: center; justify-content: center; animation: fadeUp .15s ease; }
    .modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; padding: 36px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; animation: slideIn .2s ease; }

    .toast { position: fixed; bottom: 28px; right: 28px; z-index: 200; padding: 13px 20px; border-radius: 2px; font-size: 13px; font-weight: 500; letter-spacing: .04em; animation: toastIn .2s ease; border-left: 3px solid; background: var(--surface2); color: var(--cream); }
    .toast-success { border-color: #70c080; }
    .toast-error   { border-color: var(--red); }

    .sbadge { font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; padding: 2px 8px; border-radius: 1px; }
    .sbadge-ok  { color: #70c080; background: rgba(40,150,60,.1);   border: 1px solid rgba(40,150,60,.2); }
    .sbadge-low { color: var(--amber2); background: rgba(200,149,42,.1); border: 1px solid rgba(200,149,42,.2); }
    .sbadge-out { color: #e07070; background: rgba(192,57,43,.1);  border: 1px solid rgba(192,57,43,.2); }
    .gbadge { font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; padding: 2px 8px; border-radius: 1px; background: rgba(100,95,85,.2); color: var(--cream2); border: 1px solid var(--border); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const API_BASE = "http://localhost:8000";

const GENRES = ["Jazz","Rock","Soul","Blues","Clásica","Pop","Electrónica","Folk","Reggae","Hip-Hop","Metal","R&B"];

const api = {
  getAll: (q="") => fetch(`${API_BASE}/products${q?`?search=${encodeURIComponent(q)}`:""}`).then(r=>r.json()),
  create: (d) => fetch(`${API_BASE}/products`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(async r=>{const j=await r.json();if(!r.ok)throw new Error(j.detail||"Error");return j;}),
  update: (id,d) => fetch(`${API_BASE}/products/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(async r=>{const j=await r.json();if(!r.ok)throw new Error(j.detail||"Error");return j;}),
  delete: (id) => fetch(`${API_BASE}/products/${id}`,{method:"DELETE"}).then(r=>{if(!r.ok&&r.status!==204)throw new Error("Error");}),
};

function StockBadge({stock}){
  if(stock===0) return <span className="sbadge sbadge-out">Agotado</span>;
  if(stock<=3)  return <span className="sbadge sbadge-low">{stock} unid.</span>;
  return <span className="sbadge sbadge-ok">{stock} unid.</span>;
}
function Disc({spinning,large,url}){
  if(url) return <div style={{width:large?80:64,height:large?80:64,borderRadius:"50%",overflow:"hidden",flexShrink:0,border:"2px solid var(--border2)"}}><img src={url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/></div>;
  return <div className={`vinyl-disc${spinning?" spinning":""}${large?" lg":""}`}/>;
}
function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t);},[]);
  return <div className={`toast toast-${type}`}>{message}</div>;
}

function ProductModal({product,onClose,onSave}){
  const isEdit=!!product;
  const [form,setForm]=useState({name:product?.name||"",description:product?.description||"",price:product?.price||"",stock:product?.stock??"",image_url:product?.image_url||""});
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const genre=form.description?.match(/\[([^\]]+)\]/)?.[1]||"";
  const setGenre=g=>{const s=form.description.replace(/\[.*?\]\s*/g,"").trim();setForm(f=>({...f,description:g?(g===genre?s:`[${g}] ${s}`):`[${g}] ${s}`}));};
  const handle=e=>setForm(f=>({...f,[e.target.name]:e.target.value}));
  const submit=async()=>{
    if(!form.name.trim())return setError("El título es obligatorio.");
    if(!form.price||isNaN(form.price)||Number(form.price)<=0)return setError("Precio debe ser mayor a 0.");
    if(form.stock===""||isNaN(form.stock)||Number(form.stock)<0)return setError("Stock debe ser ≥ 0.");
    setLoading(true);setError(null);
    try{
      const p={name:form.name.trim(),description:form.description.trim()||null,price:parseFloat(form.price),stock:parseInt(form.stock),image_url:form.image_url.trim()||null};
      if(isEdit){await api.update(product.id,p);onSave("Vinilo actualizado");}
      else{await api.create(p);onSave("Vinilo añadido al catálogo");}
    }catch(e){setError(e.message);}finally{setLoading(false);}
  };
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
          <div>
            <h2 className="serif" style={{fontSize:26,fontWeight:700,fontStyle:"italic",color:"var(--cream)",lineHeight:1.1}}>{isEdit?"Editar Vinilo":"Añadir Vinilo"}</h2>
            <p style={{fontSize:13,color:"var(--cream2)",marginTop:4}}>{isEdit?`Editando: ${product.name}`:"Nuevo registro al catálogo"}</p>
          </div>
          <Disc large url={form.image_url}/>
        </div>
        <div style={{display:"grid",gap:18}}>
          <div><label>Título del Álbum *</label><input name="name" value={form.name} onChange={handle} placeholder="Ej: Kind of Blue"/></div>
          <div><label>Artista / Descripción</label><textarea name="description" value={form.description} onChange={handle} placeholder="Ej: Miles Davis — Jazz modal, 1959…" rows={2} style={{resize:"none"}}/></div>
          <div>
            <label>Género</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:2}}>
              {GENRES.map(g=>(
                <button key={g} onClick={()=>setGenre(g)}
                  style={{padding:"4px 12px",borderRadius:1,fontSize:11,letterSpacing:".07em",textTransform:"uppercase",cursor:"pointer",fontFamily:"Space Grotesk, sans-serif",transition:"all .12s",background:genre===g?"var(--amber)":"transparent",color:genre===g?"#0a0908":"var(--cream2)",border:`1px solid ${genre===g?"var(--amber)":"var(--border)"}`}}>
                  {g}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div><label>Precio (USD) *</label><input name="price" type="number" step=".01" min="0" value={form.price} onChange={handle} placeholder="29.99"/></div>
            <div><label>Stock *</label><input name="stock" type="number" min="0" step="1" value={form.stock} onChange={handle} placeholder="0"/></div>
          </div>
          <div><label>URL de Portada</label><input name="image_url" value={form.image_url} onChange={handle} placeholder="https://…"/></div>
          {error&&<div style={{background:"rgba(192,57,43,.1)",border:"1px solid rgba(192,57,43,.3)",borderLeft:"3px solid var(--red)",borderRadius:2,padding:"10px 14px",color:"#e07070",fontSize:13}}>{error}</div>}
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button className="btn btn-primary" onClick={submit} disabled={loading} style={{flex:1,padding:"11px 20px"}}>{loading?"Guardando…":isEdit?"Guardar Cambios":"Añadir al Catálogo"}</button>
            <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function DeleteModal({product,onClose,onConfirm}){
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{maxWidth:400}}>
        <div style={{display:"flex",gap:20,alignItems:"flex-start",marginBottom:24}}>
          <Disc url={product.image_url}/>
          <div>
            <h2 className="serif" style={{fontSize:22,fontWeight:700,color:"var(--cream)",marginBottom:6}}>Retirar del Catálogo</h2>
            <p style={{color:"var(--cream2)",fontSize:14,lineHeight:1.5}}>¿Eliminar <strong style={{color:"var(--cream)"}}>{product.name}</strong>? Esta acción es permanente.</p>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onConfirm} style={{flex:1,background:"var(--red)",color:"white",border:"none",borderRadius:2,padding:"10px 20px",cursor:"pointer",fontFamily:"Space Grotesk, sans-serif",fontWeight:500,fontSize:13,letterSpacing:".07em",textTransform:"uppercase"}}>Sí, eliminar</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

function ProductCard({product,onEdit,onDelete}){
  const [spin,setSpin]=useState(false);
  const genre=product.description?.match(/\[([^\]]+)\]/)?.[1]||"";
  const desc=product.description?.replace(/\[.*?\]\s*/g,"")||"";
  return(
    <div className="card" style={{padding:20,animation:"fadeUp .3s ease both"}}>
      <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
        <div style={{cursor:"pointer",flexShrink:0}} onClick={()=>setSpin(s=>!s)} title="Girar disco">
          <Disc spinning={spin} url={product.image_url}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:4}}>
            <h3 className="serif" style={{fontSize:17,fontWeight:700,fontStyle:"italic",color:"var(--cream)",lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{product.name}</h3>
            <span style={{color:"var(--amber)",fontFamily:"Playfair Display, serif",fontWeight:700,fontSize:17,whiteSpace:"nowrap"}}>${product.price.toFixed(2)}</span>
          </div>
          {desc&&<p style={{color:"var(--cream2)",fontSize:13,marginBottom:10,lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{desc}</p>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {genre&&<span className="gbadge">{genre}</span>}
              <StockBadge stock={product.stock}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button className="btn-sm-edit" onClick={()=>onEdit(product)}>Editar</button>
              <button className="btn-sm-del"  onClick={()=>onDelete(product)}>Eliminar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Stats({products}){
  const n=products.length;
  const val=products.reduce((s,p)=>s+p.price*p.stock,0);
  const out=products.filter(p=>p.stock===0).length;
  const avg=n?products.reduce((s,p)=>s+p.price,0)/n:0;
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:32}}>
      {[{l:"Títulos",v:n},{l:"Valor Inv.",v:`$${val.toLocaleString("es",{minimumFractionDigits:2})}`},{l:"Precio Prom.",v:`$${avg.toFixed(2)}`},{l:"Agotados",v:out,w:out>0}].map(s=>(
        <div key={s.l} style={{background:"var(--surface)",border:`1px solid ${s.w?"rgba(192,57,43,.3)":"var(--border)"}`,borderRadius:3,padding:"14px 16px"}}>
          <div style={{fontSize:22,fontFamily:"Playfair Display, serif",fontWeight:700,color:s.w?"#e07070":"var(--amber)"}}>{s.v}</div>
          <div style={{fontSize:11,color:"var(--cream2)",marginTop:2,letterSpacing:".08em",textTransform:"uppercase"}}>{s.l}</div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const [products,setProducts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [filter,setFilter]=useState("todos");

  const load=useCallback(async(q="")=>{
    setLoading(true);setError(null);
    try{const d=await api.getAll(q);if(Array.isArray(d))setProducts(d);else throw new Error("Error");}
    catch{setError(`No se pudo conectar con ${API_BASE}`);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{load("");},[]);
  useEffect(()=>{const t=setTimeout(()=>load(search),400);return()=>clearTimeout(t);},[search]);

  const notify=(m,t="success")=>{setToast({message:m,type:t});setTimeout(()=>setToast(null),3500);};
  const afterSave=async m=>{setModal(null);await load(search);notify(m);};
  const doDelete=async()=>{try{await api.delete(modal.product.id);setModal(null);await load(search);notify("Vinilo retirado del catálogo");}catch(e){notify(e.message,"error");}};

  const filters=["todos",...GENRES.slice(0,6)];
  const shown=filter==="todos"?products:products.filter(p=>p.description?.toLowerCase().includes(`[${filter.toLowerCase()}]`));

  return(
    <div style={{minHeight:"100vh",paddingBottom:80}}>
      {/* Header */}
      <header style={{borderBottom:"1px solid var(--border)",padding:"0 48px",background:"var(--surface)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:16,padding:"20px 0"}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"radial-gradient(circle at 50%,#888 0%,#333 15%,#111 30%,#0d0d0d 100%)",position:"relative",flexShrink:0}}>
            <div style={{position:"absolute",width:8,height:8,borderRadius:"50%",background:"var(--amber)",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}/>
          </div>
          <div>
            <h1 className="serif" style={{fontSize:26,fontWeight:900,letterSpacing:"-.02em",lineHeight:1,color:"var(--cream)"}}>WaxRoom</h1>
            <p style={{fontSize:11,color:"var(--cream2)",letterSpacing:".12em",textTransform:"uppercase",marginTop:1}}>Panel de Catálogo</p>
          </div>
        </div>
        <button className="btn btn-primary" onClick={()=>setModal({type:"create"})}>+ Nuevo Vinilo</button>
      </header>

      <main style={{maxWidth:1100,margin:"0 auto",padding:"40px 48px"}}>
        {!loading&&!error&&<Stats products={products}/>}

        {/* Toolbar */}
        <div style={{display:"flex",gap:14,marginBottom:28,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{position:"relative",flex:1}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#5a5550",fontSize:14}}>♫</span>
            <input style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:2,color:"var(--cream)",padding:"10px 14px 10px 34px",fontFamily:"Space Grotesk, sans-serif",fontSize:14,width:"100%",maxWidth:420,outline:"none"}}
              placeholder="Buscar álbum, artista…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {filters.map(f=>(
              <button key={f} onClick={()=>setFilter(f)}
                style={{padding:"5px 14px",borderRadius:1,fontSize:11,letterSpacing:".08em",textTransform:"uppercase",cursor:"pointer",fontFamily:"Space Grotesk, sans-serif",transition:"all .12s",background:filter===f?"var(--amber)":"transparent",color:filter===f?"#0a0908":"var(--cream2)",border:`1px solid ${filter===f?"var(--amber)":"var(--border)"}`}}>
                {f}
              </button>
            ))}
          </div>
        </div>

        {loading&&(
          <div style={{textAlign:"center",padding:"80px 0",color:"var(--cream2)"}}>
            <div className="vinyl-disc spinning" style={{margin:"0 auto 20px",opacity:.4}}/>
            <p style={{fontSize:13,letterSpacing:".1em",textTransform:"uppercase"}}>Cargando catálogo…</p>
          </div>
        )}

        {error&&!loading&&(
          <div style={{background:"rgba(192,57,43,.07)",border:"1px solid rgba(192,57,43,.2)",borderLeft:"3px solid var(--red)",borderRadius:3,padding:24}}>
            <p className="serif" style={{color:"#e07070",fontSize:18,fontWeight:700,marginBottom:8}}>Sin señal</p>
            <p style={{color:"var(--cream2)",fontSize:14,marginBottom:20}}>{error}</p>
            <button className="btn btn-primary" onClick={()=>load(search)}>Reintentar</button>
          </div>
        )}

        {!loading&&!error&&shown.length===0&&(
          <div style={{textAlign:"center",padding:"80px 0"}}>
            <div className="vinyl-disc" style={{margin:"0 auto 24px",opacity:.15,width:80,height:80}}/>
            <p className="serif" style={{fontSize:22,fontWeight:700,fontStyle:"italic",color:"var(--cream2)",marginBottom:8}}>
              {search?`Sin resultados para "${search}"`:filter!=="todos"?`Sin vinilos de ${filter}`:"Catálogo vacío"}
            </p>
            {!search&&filter==="todos"&&<button className="btn btn-primary" style={{marginTop:16}} onClick={()=>setModal({type:"create"})}>+ Añadir Primer Vinilo</button>}
          </div>
        )}

        {!loading&&!error&&shown.length>0&&(
          <>
            <p style={{fontSize:11,color:"#5a5550",letterSpacing:".08em",textTransform:"uppercase",marginBottom:14}}>
              {shown.length} {shown.length===1?"registro":"registros"}{filter!=="todos"?` · ${filter}`:""}{search?` · "${search}"`:""}
            </p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(400px,1fr))",gap:12}}>
              {shown.map((p,i)=>(
                <div key={p.id} style={{animationDelay:`${i*35}ms`}}>
                  <ProductCard product={p} onEdit={prod=>setModal({type:"edit",product:prod})} onDelete={prod=>setModal({type:"delete",product:prod})}/>
                </div>
              ))}
            </div>
          </>
        )}
      </main>

      <footer style={{borderTop:"1px solid var(--border)",padding:"14px 48px",display:"flex",justifyContent:"space-between"}}>
        <span style={{fontSize:13,color:"#3d3a35"}}>♪ ♫ ♩</span>
      </footer>

      {modal?.type==="create"&&<ProductModal onClose={()=>setModal(null)} onSave={afterSave}/>}
      {modal?.type==="edit"&&<ProductModal product={modal.product} onClose={()=>setModal(null)} onSave={afterSave}/>}
      {modal?.type==="delete"&&<DeleteModal product={modal.product} onClose={()=>setModal(null)} onConfirm={doDelete}/>}
      {toast&&<Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
